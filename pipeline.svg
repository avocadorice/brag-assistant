<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4b5563"/>
    </marker>
    <marker id="arr-dim" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="#0d1117" rx="16"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" fill="#30363d" font-size="12" letter-spacing="4" font-weight="500">B-RAG ASSISTANT — PIPELINE</text>

  <!-- ════════════════════════════════════════════
       COLUMN LABELS
  ════════════════════════════════════════════ -->
  <text x="150" y="100" text-anchor="middle" fill="#6e7681" font-size="11" letter-spacing="2">SOURCES</text>
  <text x="455" y="100" text-anchor="middle" fill="#6e7681" font-size="11" letter-spacing="2">RETRIEVAL</text>
  <text x="755" y="100" text-anchor="middle" fill="#6e7681" font-size="11" letter-spacing="2">GENERATION</text>
  <text x="1042" y="100" text-anchor="middle" fill="#6e7681" font-size="11" letter-spacing="2">OUTPUT</text>

  <!-- ════════════════════════════════════════════
       SOURCE BOXES (x=40 w=220)
       y: 115, 178, 241, 304  h=50  gap=13
       centers y: 140, 203, 266, 329  → vcenter=234
  ════════════════════════════════════════════ -->

  <!-- hellointerview -->
  <rect x="40" y="115" width="220" height="50" rx="8" fill="#130a25" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="150" y="136" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="600">practice platform</text>
  <text x="150" y="153" text-anchor="middle" fill="#6e7681" font-size="10.5">scraped past sessions</text>

  <!-- Notion -->
  <rect x="40" y="178" width="220" height="50" rx="8" fill="#0a1628" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="199" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">Notion API</text>
  <text x="150" y="216" text-anchor="middle" fill="#6e7681" font-size="10.5">156 pages — incremental sync</text>

  <!-- Story Bank -->
  <rect x="40" y="241" width="220" height="50" rx="8" fill="#031a0e" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="262" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">Story Bank</text>
  <text x="150" y="279" text-anchor="middle" fill="#6e7681" font-size="10.5">personal entries · highest priority</text>

  <!-- Brag Doc -->
  <rect x="40" y="304" width="220" height="50" rx="8" fill="#1a1000" stroke="#d97706" stroke-width="1.5"/>
  <text x="150" y="325" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Brag Doc / .docx</text>
  <text x="150" y="342" text-anchor="middle" fill="#6e7681" font-size="10.5">self-reflection notes</text>

  <!-- Merge lines: horizontal stubs to vertical rail, then arrow -->
  <line x1="260" y1="140" x2="276" y2="140" stroke="#374151" stroke-width="1.5"/>
  <line x1="260" y1="203" x2="276" y2="203" stroke="#374151" stroke-width="1.5"/>
  <line x1="260" y1="266" x2="276" y2="266" stroke="#374151" stroke-width="1.5"/>
  <line x1="260" y1="329" x2="276" y2="329" stroke="#374151" stroke-width="1.5"/>
  <line x1="276" y1="140" x2="276" y2="329" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Arrow to retrieval box -->
  <line x1="276" y1="234" x2="325" y2="234" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════════
       RETRIEVAL BOX (x=330 w=250 y=115 h=260)
  ════════════════════════════════════════════ -->
  <rect x="330" y="115" width="250" height="260" rx="10" fill="#0d1117" stroke="#3b82f6" stroke-width="1.5"/>

  <text x="455" y="147" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">RAG Retrieval</text>
  <line x1="350" y1="158" x2="560" y2="158" stroke="#1f2937" stroke-width="1"/>

  <text x="350" y="180" fill="#4b5563" font-size="11">▸</text>
  <text x="368" y="180" fill="#e2e8f0" font-size="11">extractThemes(query)</text>

  <text x="350" y="205" fill="#4b5563" font-size="11">▸</text>
  <text x="368" y="205" fill="#e2e8f0" font-size="11">theme overlap <tspan fill="#f59e0b" font-weight="700"> ×3</tspan></text>

  <text x="350" y="230" fill="#4b5563" font-size="11">▸</text>
  <text x="368" y="230" fill="#e2e8f0" font-size="11">keyword match <tspan fill="#94a3b8"> ×1</tspan></text>

  <text x="350" y="255" fill="#4b5563" font-size="11">▸</text>
  <text x="368" y="255" fill="#e2e8f0" font-size="11">source boost  <tspan fill="#34d399">story-bank +2</tspan></text>

  <line x1="350" y1="268" x2="560" y2="268" stroke="#1f2937" stroke-width="1"/>

  <text x="350" y="291" fill="#4b5563" font-size="11">▸</text>
  <text x="368" y="291" fill="#34d399" font-size="11">top-6 entries returned</text>

  <text x="455" y="358" text-anchor="middle" fill="#374151" font-size="10">no vector DB · no embeddings</text>

  <!-- Arrow to LLM -->
  <line x1="580" y1="234" x2="635" y2="234" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════════
       LLM BOX (x=640 w=230 y=120 h=230)
  ════════════════════════════════════════════ -->
  <rect x="640" y="120" width="230" height="240" rx="10" fill="#0d1117" stroke="#f59e0b" stroke-width="1.5"/>

  <text x="755" y="146" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">Gemini 2.5 Pro</text>
  <text x="755" y="161" text-anchor="middle" fill="#6e7681" font-size="10">Anthropic Claude (swappable)</text>
  <line x1="660" y1="171" x2="850" y2="171" stroke="#1f2937" stroke-width="1"/>

  <text x="660" y="194" fill="#4b5563" font-size="11">▸</text>
  <text x="678" y="194" fill="#e2e8f0" font-size="11">retrieved sources injected</text>

  <text x="660" y="217" fill="#4b5563" font-size="11">▸</text>
  <text x="678" y="217" fill="#e2e8f0" font-size="11">hard grounding constraint</text>

  <text x="660" y="240" fill="#4b5563" font-size="11">▸</text>
  <text x="678" y="240" fill="#e2e8f0" font-size="11">cite only what's retrieved</text>

  <text x="660" y="263" fill="#4b5563" font-size="11">▸</text>
  <text x="678" y="263" fill="#e2e8f0" font-size="11">STAR / CARL · first person · ~400w</text>

  <text x="755" y="340" text-anchor="middle" fill="#374151" font-size="10">audio → Gemini 2.0 Flash (transcription)</text>

  <!-- Arrow to output -->
  <line x1="870" y1="234" x2="930" y2="234" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════════
       OUTPUT BOXES (x=935 w=220)
       vcenter=234 → box1 y=182 h=65 / box2 y=267 h=65
  ════════════════════════════════════════════ -->

  <!-- Grounded answer -->
  <rect x="935" y="182" width="220" height="65" rx="8" fill="#031a0e" stroke="#059669" stroke-width="1.5"/>
  <text x="1045" y="210" text-anchor="middle" fill="#34d399" font-size="13" font-weight="600">grounded answer</text>
  <text x="1045" y="230" text-anchor="middle" fill="#6e7681" font-size="10.5">real stories · cited sources</text>

  <!-- Connector between output boxes -->
  <line x1="1045" y1="247" x2="1045" y2="267" stroke="#374151" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- Follow-up questions -->
  <rect x="935" y="267" width="220" height="65" rx="8" fill="#0a1628" stroke="#2563eb" stroke-width="1.5"/>
  <text x="1045" y="295" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="600">follow-up questions</text>
  <text x="1045" y="315" text-anchor="middle" fill="#6e7681" font-size="10.5">3 rounds · auto-generated</text>

  <!-- ════════════════════════════════════════════
       PRACTICE MODE SUB-FLOW (y≈430–510)
  ════════════════════════════════════════════ -->
  <text x="600" y="430" text-anchor="middle" fill="#30363d" font-size="11" letter-spacing="3">PRACTICE MODE</text>
  <line x1="200" y1="437" x2="430" y2="437" stroke="#21262d" stroke-width="1"/>
  <line x1="770" y1="437" x2="1000" y2="437" stroke="#21262d" stroke-width="1"/>

  <!-- Voice box -->
  <rect x="60" y="450" width="150" height="48" rx="8" fill="#0d1117" stroke="#374151" stroke-width="1.5"/>
  <text x="135" y="470" text-anchor="middle" fill="#8b949e" font-size="12">🎙 voice</text>
  <text x="135" y="487" text-anchor="middle" fill="#4b5563" font-size="10">sox record</text>

  <!-- Arrow -->
  <line x1="210" y1="474" x2="260" y2="474" stroke="#374151" stroke-width="1.5" marker-end="url(#arr-dim)"/>

  <!-- Gemini flash box -->
  <rect x="265" y="450" width="200" height="48" rx="8" fill="#0d1117" stroke="#374151" stroke-width="1.5"/>
  <text x="365" y="470" text-anchor="middle" fill="#8b949e" font-size="12">Gemini 2.0 Flash</text>
  <text x="365" y="487" text-anchor="middle" fill="#4b5563" font-size="10">audio transcription — no separate STT</text>

  <!-- Arrow -->
  <line x1="465" y1="474" x2="515" y2="474" stroke="#374151" stroke-width="1.5" marker-end="url(#arr-dim)"/>

  <!-- Random Q box -->
  <rect x="520" y="450" width="165" height="48" rx="8" fill="#0d1117" stroke="#374151" stroke-width="1.5"/>
  <text x="602" y="470" text-anchor="middle" fill="#8b949e" font-size="12">random question</text>
  <text x="602" y="487" text-anchor="middle" fill="#4b5563" font-size="10">HI history + built-in bank</text>

  <!-- Arrow -->
  <line x1="685" y1="474" x2="735" y2="474" stroke="#374151" stroke-width="1.5" marker-end="url(#arr-dim)"/>

  <!-- Main pipeline box -->
  <rect x="740" y="450" width="165" height="48" rx="8" fill="#0d1117" stroke="#374151" stroke-width="1.5"/>
  <text x="822" y="470" text-anchor="middle" fill="#8b949e" font-size="12">↑ main pipeline</text>
  <text x="822" y="487" text-anchor="middle" fill="#4b5563" font-size="10">retrieval → generation</text>

  <!-- Arrow -->
  <line x1="905" y1="474" x2="955" y2="474" stroke="#374151" stroke-width="1.5" marker-end="url(#arr-dim)"/>

  <!-- Follow-up loop box -->
  <rect x="960" y="450" width="165" height="48" rx="8" fill="#0d1117" stroke="#374151" stroke-width="1.5"/>
  <text x="1042" y="470" text-anchor="middle" fill="#8b949e" font-size="12">follow-up loop</text>
  <text x="1042" y="487" text-anchor="middle" fill="#4b5563" font-size="10">3 rounds · voice or text</text>

  <!-- Footer -->
  <text x="600" y="590" text-anchor="middle" fill="#21262d" font-size="11" letter-spacing="1">github.com/avocadorice/brag-assistant</text>
</svg>
